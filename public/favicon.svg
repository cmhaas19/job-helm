<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="8" fill="#7c3aed"/>
  <g transform="translate(16,16)">
    <!-- Compass circle -->
    <circle cx="0" cy="0" r="9" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Cardinal ticks -->
    <line x1="0" y1="-9" x2="0" y2="-7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="9" y1="0" x2="7" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="9" x2="0" y2="7" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-9" y1="0" x2="-7" y2="0" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Compass needle - diamond shape -->
    <polygon points="0,-6 2,0 0,6 -2,0" fill="white" opacity="0.9"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="1.5" fill="#7c3aed"/>
  </g>
</svg>
